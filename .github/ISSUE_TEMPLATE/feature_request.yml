name: Feature request
description: Suggest a new capability or behavior for Bandolier.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for new functionality. For changes to existing behavior, "bug report" might fit better — file that instead if you think the current behavior is wrong rather than missing.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. Solutions are easier to evaluate when the problem is clear.
      placeholder: "I want to deploy clusters using a custom CNI..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Bandolier to behave?
      placeholder: "An advanced step in the initialize wizard for CNI choice, with..."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which area of Bandolier does this touch?
      options:
        - UI
        - API / backend
        - Deploy pipeline (Terraform / Ansible)
        - Vault / secrets
        - Container stack (compose / Dockerfiles)
        - Documentation
        - Cross-cutting / not sure
    validations:
      required: true

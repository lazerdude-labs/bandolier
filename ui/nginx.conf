server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate     /etc/nginx/tls/server.crt;
  ssl_certificate_key /etc/nginx/tls/server.key;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }
  location /ws/ {
    proxy_pass http://api:8080;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Preserve the browser's Host so the api's same-origin check
    # (coder/websocket Accept) sees Origin matching r.Host. Without
    # this, nginx forwards the upstream name "api:8080" as Host while
    # Origin stays as the operator's hostname/IP, the check 403s, and
    # the log stream goes silent. See deployments/handlers.go's
    # wsOriginPatterns docstring for the env-var escape hatch.
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_read_timeout 86400;
  }
  location / {
    try_files $uri $uri/ /index.html;
  }
}

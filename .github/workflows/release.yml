name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish:${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: api
          - name: ui
            context: ui
          - name: vault-agent
            context: deploy/vault-init
          - name: tls-init
            context: deploy/tls-init
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is auto-issued per-run; with packages:write at the
          # workflow level it's sufficient to push to ghcr.io/<org>/<repo>/*.
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/lazerdude-labs/bandolier/${{ matrix.name }}
          # Three tags per image:
          #   {{version}}            -> 0.1.0   (full semver)
          #   {{major}}.{{minor}}    -> 0.1     (floating minor pin)
          #   latest                 -> latest  (always points at the most recent release)
          # Operators pin to {{version}} for reproducibility, {{major}}.{{minor}}
          # for "latest patch in this line", or latest for "always newest".
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/lazerdude-labs/bandolier
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.title=bandolier-${{ matrix.name }}
            org.opencontainers.image.description=Bandolier ${{ matrix.name }} container

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Single arch for v0.1.x — Bandolier deploys onto Proxmox x86_64
          # VMs in the documented topology. arm64 can be added later if there's
          # demand.
          platforms: linux/amd64
          # Buildx layer cache via GitHub Actions cache. Speeds up incremental
          # releases when only some images changed.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
